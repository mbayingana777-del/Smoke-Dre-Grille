<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smoke & Dre Grille | Full Menu</title>
  <style>
    :root{
      --bg:#070707;
      --panel:#101010;
      --panel-2:#141414;
      --text:#f7f3ed;
      --muted:#b7aea2;
      --accent:#ff8a1d;
      --accent-2:#ffb15c;
      --line:#242424;
      --shadow:0 20px 60px rgba(0,0,0,.45);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,138,29,.08), transparent 28%),
        radial-gradient(circle at top right, rgba(255,177,92,.05), transparent 22%),
        linear-gradient(180deg, #050505 0%, #0a0a0a 100%);
      color:var(--text);
      line-height:1.5;
    }

    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}

    .container{
      width:min(1180px, calc(100% - 32px));
      margin:0 auto;
    }

    .nav{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter:blur(14px);
      background:rgba(7,7,7,.78);
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .nav-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:14px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      min-width:0;
    }

    .site-logo{
      height:56px;
      width:auto;
      max-width:none;
      object-fit:contain;
    }

    .nav-links{
      display:flex;
      gap:20px;
      color:var(--muted);
      font-size:15px;
    }

    .nav-links a:hover{color:var(--text)}

    .nav-cta{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height:48px;
      padding:0 18px;
      border-radius:14px;
      border:1px solid transparent;
      font-weight:700;
      transition:.22s ease;
      cursor:pointer;
    }

    .button:hover{transform:translateY(-1px)}

    .button-primary{
      color:#180a00;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow:0 12px 26px rgba(255,138,29,.22);
    }

    .button-secondary{
      border-color:#303030;
      background:#111;
      color:var(--text);
    }

    .hero{
      position:relative;
      padding:92px 0 46px;
      overflow:hidden;
    }

    .hero:before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,138,29,.14), transparent 24%),
        radial-gradient(circle at 85% 10%, rgba(255,177,92,.10), transparent 20%);
      pointer-events:none;
    }

    .hero-inner{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:28px;
      align-items:center;
    }

    .eyebrow{
      display:inline-flex;
      gap:10px;
      align-items:center;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.35);
      color:var(--accent-2);
      border-radius:999px;
      padding:8px 12px;
      font-size:14px;
      margin-bottom:18px;
    }

    h1{
      margin:0 0 16px;
      font-size:clamp(42px, 7vw, 84px);
      line-height:.95;
      letter-spacing:-2px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      max-width:620px;
      font-size:19px;
    }

    .hero-card{
      border:1px solid var(--line);
      background:linear-gradient(180deg, #121212, #0d0d0d);
      border-radius:28px;
      padding:22px;
      box-shadow:var(--shadow);
    }

    .hero-card h3{
      margin:0 0 14px;
      font-size:24px;
    }

    .hero-list{
      display:grid;
      gap:12px;
      margin:0;
      padding:0;
      list-style:none;
      color:var(--muted);
    }

    .hero-list li{
      display:flex;
      justify-content:space-between;
      gap:16px;
      padding-bottom:12px;
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .section{
      padding:10px 0 38px;
    }

    .section-title{
      margin:0 0 18px;
      font-size:clamp(30px, 4vw, 48px);
      letter-spacing:-1px;
      line-height:1.02;
    }

    .menu-layout{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
      align-items:start;
    }

    .menu-panel{
      border:1px solid var(--line);
      background:linear-gradient(180deg, #121212, #0d0d0d);
      border-radius:28px;
      padding:28px;
      box-shadow:var(--shadow);
    }

    .menu-panel-header{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:16px;
      margin-bottom:20px;
    }

    .menu-panel-header h2{
      margin:0;
      font-size:32px;
      line-height:1;
      letter-spacing:-1px;
    }

    .menu-panel-header p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .menu-group{
      margin-top:22px;
    }

    .menu-group:first-of-type{
      margin-top:0;
    }

    .group-title{
      margin:0 0 14px;
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:var(--accent-2);
    }

    .menu-item{
      display:grid;
      grid-template-columns:1fr auto;
      gap:16px;
      padding:16px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .menu-item:last-child{
      border-bottom:none;
    }

    .menu-item h3{
      margin:0 0 6px;
      font-size:28px;
      line-height:1.02;
      letter-spacing:-.8px;
    }

    .menu-item p{
      margin:0;
      color:var(--muted);
      font-size:17px;
    }

    .price{
      font-size:28px;
      font-weight:800;
      color:var(--accent-2);
      white-space:nowrap;
      align-self:start;
    }

    .special-note{
      margin-top:18px;
      padding:16px 18px;
      border-radius:18px;
      background:#0f0f0f;
      border:1px solid rgba(255,255,255,.06);
      color:var(--muted);
      font-size:16px;
    }

    .top-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:22px;
      margin-top:8px;
    }

    .food-card{
      border:1px solid var(--line);
      background:linear-gradient(180deg, #121212, #0d0d0d);
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .food-shot{
      height:240px;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .food-copy{
      padding:20px;
    }

    .food-copy h3{
      margin:0 0 8px;
      font-size:24px;
    }

    .food-copy p{
      margin:0;
      color:var(--muted);
      font-size:16px;
    }

    .bottom-cta{
      margin:18px 0 50px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, #111, #0c0c0c);
      border-radius:28px;
      padding:28px;
      box-shadow:var(--shadow);
      display:flex;
      justify-content:space-between;
      gap:18px;
      align-items:center;
      flex-wrap:wrap;
    }

    .bottom-cta h3{
      margin:0 0 8px;
      font-size:32px;
      line-height:1;
    }

    .bottom-cta p{
      margin:0;
      color:var(--muted);
      font-size:17px;
    }

    @media (max-width: 980px){
      .hero-inner,
      .menu-layout,
      .top-grid{
        grid-template-columns:1fr;
      }

      .nav-links{
        display:none;
      }
    }

    @media (max-width: 680px){
      .site-logo{
        height:46px;
      }

      .nav-cta .button-secondary{
        display:none;
      }

      .menu-item h3{
        font-size:23px;
      }

      .price{
        font-size:24px;
      }

      .food-shot{
        height:220px;
      }
    }
  </style>
</head
